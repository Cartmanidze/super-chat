server_name: matrix.localhost
pid_file: /data/homeserver.pid
public_baseurl: https://matrix.localhost/
report_stats: false

listeners:
  - port: 8008
    tls: false
    type: http
    x_forwarded: true
    resources:
      - names: [client, federation]
        compress: false

database:
  name: psycopg2
  allow_unsafe_locale: true
  args:
    user: postgres
    password: postgres
    database: synapse
    host: postgres
    cp_min: 5
    cp_max: 10

registration_shared_secret: replace-me
enable_registration: false
enable_registration_without_verification: false

media_store_path: /data/media_store
signing_key_path: /data/matrix.localhost.signing.key
trusted_key_servers:
  - server_name: matrix.org

retention:
  enabled: true
  default_policy:
    min_lifetime: 1d
    max_lifetime: 14d

app_service_config_files:
  - /data/telegram-registration.yaml
