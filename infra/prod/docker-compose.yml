services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  synapse:
    image: matrixdotorg/synapse:v1.128.0
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse:/data

  mautrix-telegram:
    build:
      context: ./mautrix-image
    image: prod-mautrix-telegram:hotfix
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./mautrix:/data

  mautrix-telegram-helper:
    build:
      context: ./mautrix-helper-image
    image: prod-mautrix-telegram-helper:hotfix
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./mautrix:/data

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    volumes:
      - qdrant-data:/qdrant/storage

  embedding-service:
    build:
      context: ../embedding-service
      args:
        INSTALL_BGE: ${EMBEDDING_INSTALL_BGE:-0}
    image: prod-superchat-embedding:hotfix
    restart: unless-stopped
    environment:
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_PORT: ${EMBEDDING_PORT:-7291}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_DENSE_VECTOR_SIZE: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}
    volumes:
      - embedding-cache:/root/.cache/huggingface

  superchat-web:
    build:
      context: ../..
      dockerfile: src/SuperChat.Web/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedding-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__SuperChatDb: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__Provider: Postgres
      Persistence__ConnectionString: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__AutoInitialize: "true"
      Chunking__Enabled: ${CHUNKING_ENABLED:-true}
      Chunking__PollSeconds: ${CHUNKING_POLL_SECONDS:-5}
      Chunking__MaxGapMinutes: ${CHUNKING_MAX_GAP_MINUTES:-15}
      Chunking__MaxMessagesPerChunk: ${CHUNKING_MAX_MESSAGES_PER_CHUNK:-8}
      Chunking__MaxChunkCharacters: ${CHUNKING_MAX_CHUNK_CHARACTERS:-1600}
      ChunkIndexing__Enabled: ${CHUNK_INDEXING_ENABLED:-true}
      ChunkIndexing__PollSeconds: ${CHUNK_INDEXING_POLL_SECONDS:-10}
      ChunkIndexing__BatchSize: ${CHUNK_INDEXING_BATCH_SIZE:-20}
      MeetingProjection__Enabled: ${MEETING_PROJECTION_ENABLED:-true}
      MeetingProjection__PollSeconds: ${MEETING_PROJECTION_POLL_SECONDS:-15}
      Retrieval__Enabled: ${RETRIEVAL_ENABLED:-true}
      Retrieval__PrefetchLimit: ${RETRIEVAL_PREFETCH_LIMIT:-24}
      Retrieval__ResultLimit: ${RETRIEVAL_RESULT_LIMIT:-8}
      SuperChat__BaseUrl: ${SUPERCHAT_BASE_URL}
      SuperChat__AllowedEmails__0: ${SUPERCHAT_ALLOWED_EMAILS__0}
      SuperChat__AllowedEmails__1: ${SUPERCHAT_ALLOWED_EMAILS__1}
      SuperChat__MagicLinkMinutes: ${SUPERCHAT_MAGIC_LINK_MINUTES}
      SuperChat__ApiSessionDays: ${SUPERCHAT_API_SESSION_DAYS}
      SuperChat__DevSeedSampleData: ${SUPERCHAT_DEV_SEED_SAMPLE_DATA}
      SuperChat__EnableGroupIngestion: ${SUPERCHAT_ENABLE_GROUP_INGESTION:-false}
      SuperChat__MaxIngestedGroupMembers: ${SUPERCHAT_MAX_INGESTED_GROUP_MEMBERS:-30}
      SuperChat__TodayTimeZoneId: ${SUPERCHAT_TODAY_TIME_ZONE_ID:-Europe/Moscow}
      Matrix__HomeserverUrl: ${MATRIX_PUBLIC_BASEURL}
      Matrix__AdminAccessToken: ${MATRIX_ADMIN_ACCESS_TOKEN}
      Matrix__UserIdPrefix: ${MATRIX_USER_ID_PREFIX}
      TelegramBridge__BotUserId: ${TELEGRAM_BRIDGE_BOT_USER_ID}
      TelegramBridge__WebLoginBaseUrl: ${TELEGRAM_BRIDGE_WEB_LOGIN_BASE_URL}
      TelegramBridge__ParticipantCountBaseUrl: ${TELEGRAM_BRIDGE_PARTICIPANT_COUNT_BASE_URL:-http://mautrix-telegram-helper:29318}
      Email__FromSender: ${EMAIL_FROM}
      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY}
      DeepSeek__Model: ${DEEPSEEK_MODEL}
      Qdrant__BaseUrl: ${QDRANT_BASE_URL:-http://qdrant:6333}
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Qdrant__AutoInitialize: ${QDRANT_AUTO_INITIALIZE:-true}
      Qdrant__MemoryCollectionName: ${QDRANT_MEMORY_COLLECTION_NAME:-memory_bgem3_v1}
      Qdrant__DenseVectorName: ${QDRANT_DENSE_VECTOR_NAME:-text-dense}
      Qdrant__SparseVectorName: ${QDRANT_SPARSE_VECTOR_NAME:-text-sparse}
      Qdrant__DenseVectorSize: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      Embedding__Enabled: ${EMBEDDING_ENABLED:-true}
      Embedding__BaseUrl: ${EMBEDDING_BASE_URL:-http://embedding-service:7291}
      Embedding__TimeoutSeconds: ${EMBEDDING_TIMEOUT_SECONDS:-60}
      Embedding__DenseVectorSize: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}

  superchat-api:
    build:
      context: ../..
      dockerfile: src/SuperChat.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      embedding-service:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__SuperChatDb: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__Provider: Postgres
      Persistence__ConnectionString: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__AutoInitialize: "true"
      Chunking__Enabled: ${CHUNKING_ENABLED:-true}
      Chunking__PollSeconds: ${CHUNKING_POLL_SECONDS:-5}
      Chunking__MaxGapMinutes: ${CHUNKING_MAX_GAP_MINUTES:-15}
      Chunking__MaxMessagesPerChunk: ${CHUNKING_MAX_MESSAGES_PER_CHUNK:-8}
      Chunking__MaxChunkCharacters: ${CHUNKING_MAX_CHUNK_CHARACTERS:-1600}
      ChunkIndexing__Enabled: ${CHUNK_INDEXING_ENABLED:-true}
      ChunkIndexing__PollSeconds: ${CHUNK_INDEXING_POLL_SECONDS:-10}
      ChunkIndexing__BatchSize: ${CHUNK_INDEXING_BATCH_SIZE:-20}
      MeetingProjection__Enabled: ${MEETING_PROJECTION_ENABLED:-true}
      MeetingProjection__PollSeconds: ${MEETING_PROJECTION_POLL_SECONDS:-15}
      Retrieval__Enabled: ${RETRIEVAL_ENABLED:-true}
      Retrieval__PrefetchLimit: ${RETRIEVAL_PREFETCH_LIMIT:-24}
      Retrieval__ResultLimit: ${RETRIEVAL_RESULT_LIMIT:-8}
      SuperChat__BaseUrl: ${SUPERCHAT_BASE_URL}
      SuperChat__AllowedEmails__0: ${SUPERCHAT_ALLOWED_EMAILS__0}
      SuperChat__AllowedEmails__1: ${SUPERCHAT_ALLOWED_EMAILS__1}
      SuperChat__MagicLinkMinutes: ${SUPERCHAT_MAGIC_LINK_MINUTES}
      SuperChat__ApiSessionDays: ${SUPERCHAT_API_SESSION_DAYS}
      SuperChat__DevSeedSampleData: ${SUPERCHAT_DEV_SEED_SAMPLE_DATA}
      SuperChat__EnableGroupIngestion: ${SUPERCHAT_ENABLE_GROUP_INGESTION:-false}
      SuperChat__MaxIngestedGroupMembers: ${SUPERCHAT_MAX_INGESTED_GROUP_MEMBERS:-30}
      SuperChat__TodayTimeZoneId: ${SUPERCHAT_TODAY_TIME_ZONE_ID:-Europe/Moscow}
      Matrix__HomeserverUrl: ${MATRIX_PUBLIC_BASEURL}
      Matrix__AdminAccessToken: ${MATRIX_ADMIN_ACCESS_TOKEN}
      Matrix__UserIdPrefix: ${MATRIX_USER_ID_PREFIX}
      TelegramBridge__BotUserId: ${TELEGRAM_BRIDGE_BOT_USER_ID}
      TelegramBridge__WebLoginBaseUrl: ${TELEGRAM_BRIDGE_WEB_LOGIN_BASE_URL}
      TelegramBridge__ParticipantCountBaseUrl: ${TELEGRAM_BRIDGE_PARTICIPANT_COUNT_BASE_URL:-http://mautrix-telegram-helper:29318}
      Email__FromSender: ${EMAIL_FROM}
      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY}
      DeepSeek__Model: ${DEEPSEEK_MODEL}
      Qdrant__BaseUrl: ${QDRANT_BASE_URL:-http://qdrant:6333}
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Qdrant__AutoInitialize: ${QDRANT_AUTO_INITIALIZE:-true}
      Qdrant__MemoryCollectionName: ${QDRANT_MEMORY_COLLECTION_NAME:-memory_bgem3_v1}
      Qdrant__DenseVectorName: ${QDRANT_DENSE_VECTOR_NAME:-text-dense}
      Qdrant__SparseVectorName: ${QDRANT_SPARSE_VECTOR_NAME:-text-sparse}
      Qdrant__DenseVectorSize: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      Embedding__Enabled: ${EMBEDDING_ENABLED:-true}
      Embedding__BaseUrl: ${EMBEDDING_BASE_URL:-http://embedding-service:7291}
      Embedding__TimeoutSeconds: ${EMBEDDING_TIMEOUT_SECONDS:-60}
      Embedding__DenseVectorSize: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      superchat-web:
        condition: service_started
      superchat-api:
        condition: service_started
      synapse:
        condition: service_started
      mautrix-telegram:
        condition: service_started
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  qdrant-data:
  embedding-cache:
  caddy-data:
  caddy-config:
