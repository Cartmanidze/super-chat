x-superchat-log-env: &superchat-log-env
  SUPERCHAT_LOG_ENVIRONMENT: ${SUPERCHAT_LOG_ENVIRONMENT:-prod}

x-superchat-json-logging: &superchat-json-logging
  driver: json-file
  options:
    max-size: ${DOCKER_LOG_MAX_SIZE:-20m}
    max-file: ${DOCKER_LOG_MAX_FILE:-5}
    env: SUPERCHAT_LOG_ENVIRONMENT
    labels: com.superchat.service

services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    labels:
      com.superchat.service: postgres
    environment:
      <<: *superchat-log-env
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_MULTIPLE_DATABASES: ${POSTGRES_MULTIPLE_DATABASES}
    logging: *superchat-json-logging
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10

  synapse:
    image: matrixdotorg/synapse:v1.128.0
    restart: unless-stopped
    labels:
      com.superchat.service: synapse
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *superchat-log-env
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    logging: *superchat-json-logging
    volumes:
      - ./synapse:/data

  mautrix-telegram:
    build:
      context: ./mautrix-image
    image: prod-mautrix-telegram:hotfix
    restart: unless-stopped
    labels:
      com.superchat.service: mautrix-telegram
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - ./mautrix:/data

  mautrix-telegram-helper:
    build:
      context: ./mautrix-helper-image
    image: prod-mautrix-telegram-helper:hotfix
    restart: unless-stopped
    labels:
      com.superchat.service: mautrix-telegram-helper
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - ./mautrix:/data

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    labels:
      com.superchat.service: qdrant
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - qdrant-data:/qdrant/storage

  loki:
    image: grafana/loki:3.6.3
    restart: unless-stopped
    labels:
      com.superchat.service: loki
    command:
      - -config.file=/etc/loki/loki-config.yml
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - ./loki/loki-config.yml:/etc/loki/loki-config.yml:ro
      - loki-data:/loki

  prometheus:
    image: prom/prometheus:v3.10.0
    restart: unless-stopped
    labels:
      com.superchat.service: prometheus
    depends_on:
      loki:
        condition: service_started
      qdrant:
        condition: service_started
      superchat-web:
        condition: service_started
      superchat-api:
        condition: service_started
      superchat-worker:
        condition: service_started
      fluent-bit:
        condition: service_started
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=15d
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus-data:/prometheus

  grafana:
    image: grafana/grafana:12.4.1
    restart: unless-stopped
    labels:
      com.superchat.service: grafana
    depends_on:
      loki:
        condition: service_started
      prometheus:
        condition: service_started
    environment:
      <<: *superchat-log-env
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_SERVER_DOMAIN: ${GRAFANA_HOST}
      GF_SERVER_ROOT_URL: https://${GRAFANA_HOST}
      LOG_ALERT_WEBHOOK_URL: ${LOG_ALERT_WEBHOOK_URL:-https://example.invalid/superchat-log-alerts}
    logging: *superchat-json-logging
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana-data:/var/lib/grafana

  fluent-bit:
    image: cr.fluentbit.io/fluent/fluent-bit:4.2.3
    restart: unless-stopped
    labels:
      com.superchat.service: fluent-bit
    depends_on:
      loki:
        condition: service_started
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    volumes:
      - ./fluent-bit/fluent-bit.conf:/fluent-bit/etc/fluent-bit.conf:ro
      - ./fluent-bit/parsers.conf:/fluent-bit/etc/parsers.conf:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - fluent-bit-state:/fluent-bit/state

  embedding-service:
    build:
      context: ../embedding-service
      args:
        INSTALL_BGE: ${EMBEDDING_INSTALL_BGE:-0}
    image: prod-superchat-embedding:hotfix
    restart: unless-stopped
    labels:
      com.superchat.service: embedding-service
    environment:
      <<: *superchat-log-env
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_PORT: ${EMBEDDING_PORT:-7291}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_DENSE_VECTOR_SIZE: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}
    logging: *superchat-json-logging
    volumes:
      - embedding-cache:/root/.cache/huggingface

  text-enrichment-service:
    build:
      context: ../text-enrichment-service
    restart: unless-stopped
    labels:
      com.superchat.service: text-enrichment-service
    environment:
      <<: *superchat-log-env
      TEXT_ENRICHMENT_PORT: ${TEXT_ENRICHMENT_PORT:-7391}
      TEXT_ENRICHMENT_HEIDELTIME_LANGUAGE: ${TEXT_ENRICHMENT_HEIDELTIME_LANGUAGE:-Russian}
      TEXT_ENRICHMENT_HEIDELTIME_DOCUMENT_TYPE: ${TEXT_ENRICHMENT_HEIDELTIME_DOCUMENT_TYPE:-colloquial}
      TEXT_ENRICHMENT_LOG_LEVEL: ${TEXT_ENRICHMENT_LOG_LEVEL:-INFO}
    logging: *superchat-json-logging

  superchat-db-migrator:
    image: ${SUPERCHAT_DB_MIGRATOR_IMAGE:-ghcr.io/cartmanidze/superchat-db-migrator:main}
    profiles:
      - ops
    restart: "no"
    labels:
      com.superchat.service: superchat-db-migrator
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      <<: *superchat-log-env
      ASPNETCORE_ENVIRONMENT: Production
      ConnectionStrings__SuperChatDb: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__Provider: Postgres
      Persistence__ConnectionString: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Qdrant__BaseUrl: ${QDRANT_BASE_URL:-http://qdrant:6333}
      Qdrant__GrpcPort: ${QDRANT_GRPC_PORT:-6334}
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Qdrant__AutoInitialize: ${QDRANT_AUTO_INITIALIZE:-true}
      Qdrant__MemoryCollectionName: ${QDRANT_MEMORY_COLLECTION_NAME:-memory_bgem3_v1}
      Qdrant__DenseVectorName: ${QDRANT_DENSE_VECTOR_NAME:-text-dense}
      Qdrant__SparseVectorName: ${QDRANT_SPARSE_VECTOR_NAME:-text-sparse}
      Qdrant__DenseVectorSize: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
    logging: *superchat-json-logging

  superchat-web:
    image: ${SUPERCHAT_WEB_IMAGE:-ghcr.io/cartmanidze/superchat-web:main}
    restart: unless-stopped
    labels:
      com.superchat.service: superchat-web
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/health | grep -q ok"]
      interval: 15s
      timeout: 5s
      retries: 8

  superchat-api:
    image: ${SUPERCHAT_API_IMAGE:-ghcr.io/cartmanidze/superchat-api:main}
    restart: unless-stopped
    labels:
      com.superchat.service: superchat-api
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      <<: *superchat-log-env
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__SuperChatDb: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__Provider: Postgres
      Persistence__ConnectionString: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Chunking__Enabled: ${CHUNKING_ENABLED:-true}
      Chunking__PollSeconds: ${CHUNKING_POLL_SECONDS:-5}
      Chunking__MaxGapMinutes: ${CHUNKING_MAX_GAP_MINUTES:-15}
      Chunking__MaxMessagesPerChunk: ${CHUNKING_MAX_MESSAGES_PER_CHUNK:-8}
      Chunking__MaxChunkCharacters: ${CHUNKING_MAX_CHUNK_CHARACTERS:-1600}
      ChunkIndexing__Enabled: ${CHUNK_INDEXING_ENABLED:-true}
      ChunkIndexing__PollSeconds: ${CHUNK_INDEXING_POLL_SECONDS:-10}
      ChunkIndexing__BatchSize: ${CHUNK_INDEXING_BATCH_SIZE:-20}
      MeetingProjection__Enabled: ${MEETING_PROJECTION_ENABLED:-true}
      MeetingProjection__PollSeconds: ${MEETING_PROJECTION_POLL_SECONDS:-15}
      Resolution__EnableDueMeetingsSweep: ${RESOLUTION_ENABLE_DUE_MEETINGS_SWEEP:-true}
      Resolution__DueMeetingsSweepMinutes: ${RESOLUTION_DUE_MEETINGS_SWEEP_MINUTES:-10}
      Retrieval__Enabled: ${RETRIEVAL_ENABLED:-true}
      Retrieval__PrefetchLimit: ${RETRIEVAL_PREFETCH_LIMIT:-24}
      Retrieval__ResultLimit: ${RETRIEVAL_RESULT_LIMIT:-8}
      ChatAnswering__Enabled: ${CHAT_ANSWERING_ENABLED:-true}
      ChatAnswering__MaxContextChunks: ${CHAT_ANSWERING_MAX_CONTEXT_CHUNKS:-5}
      ChatAnswering__MaxEvidenceItems: ${CHAT_ANSWERING_MAX_EVIDENCE_ITEMS:-3}
      ChatAnswering__MaxContextCharacters: ${CHAT_ANSWERING_MAX_CONTEXT_CHARACTERS:-4800}
      ChatAnswering__MaxOutputTokens: ${CHAT_ANSWERING_MAX_OUTPUT_TOKENS:-500}
      SuperChat__BaseUrl: ${SUPERCHAT_BASE_URL}
      SuperChat__AdminEmails__0: ${SUPERCHAT_ADMIN_EMAILS__0:-}
      SuperChat__AdminPasswordHash: ${SUPERCHAT_ADMIN_PASSWORD_HASH:-}
      SuperChat__VerificationCodeMinutes: ${SUPERCHAT_VERIFICATION_CODE_MINUTES:-10}
      SuperChat__MaxVerificationAttempts: ${SUPERCHAT_MAX_VERIFICATION_ATTEMPTS:-5}
      SuperChat__ApiSessionDays: ${SUPERCHAT_API_SESSION_DAYS}
      SuperChat__DevSeedSampleData: ${SUPERCHAT_DEV_SEED_SAMPLE_DATA}
      SuperChat__EnableGroupIngestion: ${SUPERCHAT_ENABLE_GROUP_INGESTION:-false}
      SuperChat__MaxIngestedGroupMembers: ${SUPERCHAT_MAX_INGESTED_GROUP_MEMBERS:-30}
      SuperChat__TodayTimeZoneId: ${SUPERCHAT_TODAY_TIME_ZONE_ID:-Europe/Moscow}
      Matrix__HomeserverUrl: ${MATRIX_INTERNAL_BASEURL:-http://synapse:8008}
      Matrix__AdminAccessToken: ${MATRIX_ADMIN_ACCESS_TOKEN}
      Matrix__UserIdPrefix: ${MATRIX_USER_ID_PREFIX}
      TelegramBridge__BotUserId: ${TELEGRAM_BRIDGE_BOT_USER_ID}
      TelegramBridge__WebLoginBaseUrl: ${TELEGRAM_BRIDGE_WEB_LOGIN_BASE_URL}
      TelegramBridge__ParticipantCountBaseUrl: ${TELEGRAM_BRIDGE_PARTICIPANT_COUNT_BASE_URL:-http://mautrix-telegram-helper:29318}
      Email__FromSender: ${EMAIL_FROM}
      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      Email__SmtpUsername: ${EMAIL_SMTP_USERNAME:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL:-false}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY}
      DeepSeek__Model: ${DEEPSEEK_MODEL}
      TextEnrichment__Enabled: ${TEXT_ENRICHMENT_ENABLED:-false}
      TextEnrichment__BaseUrl: ${TEXT_ENRICHMENT_BASE_URL:-http://text-enrichment-service:7391}
      TextEnrichment__TimeoutSeconds: ${TEXT_ENRICHMENT_TIMEOUT_SECONDS:-20}
      Qdrant__BaseUrl: ${QDRANT_BASE_URL:-http://qdrant:6333}
      Qdrant__GrpcPort: ${QDRANT_GRPC_PORT:-6334}
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Qdrant__MemoryCollectionName: ${QDRANT_MEMORY_COLLECTION_NAME:-memory_bgem3_v1}
      Qdrant__DenseVectorName: ${QDRANT_DENSE_VECTOR_NAME:-text-dense}
      Qdrant__SparseVectorName: ${QDRANT_SPARSE_VECTOR_NAME:-text-sparse}
      Qdrant__DenseVectorSize: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      Embedding__Enabled: ${EMBEDDING_ENABLED:-true}
      Embedding__Backend: ${EMBEDDING_BACKEND:-LocalService}
      Embedding__BaseUrl: ${EMBEDDING_BASE_URL:-http://embedding-service:7291}
      Embedding__TimeoutSeconds: ${EMBEDDING_TIMEOUT_SECONDS:-60}
      Embedding__DenseVectorSize: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}
      Embedding__YandexBaseUrl: ${EMBEDDING_YANDEX_BASE_URL:-https://ai.api.cloud.yandex.net}
      Embedding__YandexApiKey: ${EMBEDDING_YANDEX_API_KEY}
      Embedding__YandexFolderId: ${EMBEDDING_YANDEX_FOLDER_ID}
      Embedding__YandexDocModelUri: ${EMBEDDING_YANDEX_DOC_MODEL_URI}
      Embedding__YandexQueryModelUri: ${EMBEDDING_YANDEX_QUERY_MODEL_URI}
      Embedding__YandexDocModelName: ${EMBEDDING_YANDEX_DOC_MODEL_NAME:-text-search-doc}
      Embedding__YandexQueryModelName: ${EMBEDDING_YANDEX_QUERY_MODEL_NAME:-text-search-query}
    logging: *superchat-json-logging

  superchat-worker:
    image: ${SUPERCHAT_WORKER_IMAGE:-ghcr.io/cartmanidze/superchat-worker:main}
    restart: unless-stopped
    labels:
      com.superchat.service: superchat-worker
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      <<: *superchat-log-env
      ASPNETCORE_ENVIRONMENT: Production
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SuperChatDb: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Persistence__Provider: Postgres
      Persistence__ConnectionString: ${SUPERCHAT_PERSISTENCE_CONNECTION}
      Chunking__Enabled: ${CHUNKING_ENABLED:-true}
      Chunking__PollSeconds: ${CHUNKING_POLL_SECONDS:-5}
      Chunking__MaxGapMinutes: ${CHUNKING_MAX_GAP_MINUTES:-15}
      Chunking__MaxMessagesPerChunk: ${CHUNKING_MAX_MESSAGES_PER_CHUNK:-8}
      Chunking__MaxChunkCharacters: ${CHUNKING_MAX_CHUNK_CHARACTERS:-1600}
      ChunkIndexing__Enabled: ${CHUNK_INDEXING_ENABLED:-true}
      ChunkIndexing__PollSeconds: ${CHUNK_INDEXING_POLL_SECONDS:-10}
      ChunkIndexing__BatchSize: ${CHUNK_INDEXING_BATCH_SIZE:-20}
      MeetingProjection__Enabled: ${MEETING_PROJECTION_ENABLED:-true}
      MeetingProjection__PollSeconds: ${MEETING_PROJECTION_POLL_SECONDS:-15}
      PipelineMessaging__Enabled: ${PIPELINE_MESSAGING_ENABLED:-true}
      PipelineMessaging__InputQueueName: ${PIPELINE_MESSAGING_INPUT_QUEUE_NAME:-superchat-pipeline}
      PipelineMessaging__TransportTableName: ${PIPELINE_MESSAGING_TRANSPORT_TABLE_NAME:-rebus_messages}
      PipelineMessaging__Workers: ${PIPELINE_MESSAGING_WORKERS:-1}
      PipelineMessaging__MaxParallelism: ${PIPELINE_MESSAGING_MAX_PARALLELISM:-1}
      Resolution__EnableDueMeetingsSweep: ${RESOLUTION_ENABLE_DUE_MEETINGS_SWEEP:-true}
      Resolution__DueMeetingsSweepMinutes: ${RESOLUTION_DUE_MEETINGS_SWEEP_MINUTES:-10}
      Retrieval__Enabled: ${RETRIEVAL_ENABLED:-true}
      Retrieval__PrefetchLimit: ${RETRIEVAL_PREFETCH_LIMIT:-24}
      Retrieval__ResultLimit: ${RETRIEVAL_RESULT_LIMIT:-8}
      ChatAnswering__Enabled: ${CHAT_ANSWERING_ENABLED:-true}
      ChatAnswering__MaxContextChunks: ${CHAT_ANSWERING_MAX_CONTEXT_CHUNKS:-5}
      ChatAnswering__MaxEvidenceItems: ${CHAT_ANSWERING_MAX_EVIDENCE_ITEMS:-3}
      ChatAnswering__MaxContextCharacters: ${CHAT_ANSWERING_MAX_CONTEXT_CHARACTERS:-4800}
      ChatAnswering__MaxOutputTokens: ${CHAT_ANSWERING_MAX_OUTPUT_TOKENS:-500}
      SuperChat__BaseUrl: ${SUPERCHAT_BASE_URL}
      SuperChat__AdminEmails__0: ${SUPERCHAT_ADMIN_EMAILS__0:-}
      SuperChat__AdminPasswordHash: ${SUPERCHAT_ADMIN_PASSWORD_HASH:-}
      SuperChat__VerificationCodeMinutes: ${SUPERCHAT_VERIFICATION_CODE_MINUTES:-10}
      SuperChat__MaxVerificationAttempts: ${SUPERCHAT_MAX_VERIFICATION_ATTEMPTS:-5}
      SuperChat__ApiSessionDays: ${SUPERCHAT_API_SESSION_DAYS}
      SuperChat__DevSeedSampleData: ${SUPERCHAT_DEV_SEED_SAMPLE_DATA}
      SuperChat__EnableGroupIngestion: ${SUPERCHAT_ENABLE_GROUP_INGESTION:-false}
      SuperChat__MaxIngestedGroupMembers: ${SUPERCHAT_MAX_INGESTED_GROUP_MEMBERS:-30}
      SuperChat__TodayTimeZoneId: ${SUPERCHAT_TODAY_TIME_ZONE_ID:-Europe/Moscow}
      Matrix__HomeserverUrl: ${MATRIX_INTERNAL_BASEURL:-http://synapse:8008}
      Matrix__AdminAccessToken: ${MATRIX_ADMIN_ACCESS_TOKEN}
      Matrix__UserIdPrefix: ${MATRIX_USER_ID_PREFIX}
      TelegramBridge__BotUserId: ${TELEGRAM_BRIDGE_BOT_USER_ID}
      TelegramBridge__WebLoginBaseUrl: ${TELEGRAM_BRIDGE_WEB_LOGIN_BASE_URL}
      TelegramBridge__ParticipantCountBaseUrl: ${TELEGRAM_BRIDGE_PARTICIPANT_COUNT_BASE_URL:-http://mautrix-telegram-helper:29318}
      Email__FromSender: ${EMAIL_FROM}
      Email__SmtpHost: ${EMAIL_SMTP_HOST}
      Email__SmtpPort: ${EMAIL_SMTP_PORT}
      Email__SmtpUsername: ${EMAIL_SMTP_USERNAME:-}
      Email__SmtpPassword: ${EMAIL_SMTP_PASSWORD:-}
      Email__EnableSsl: ${EMAIL_ENABLE_SSL:-false}
      DeepSeek__ApiKey: ${DEEPSEEK_API_KEY}
      DeepSeek__Model: ${DEEPSEEK_MODEL}
      TextEnrichment__Enabled: ${TEXT_ENRICHMENT_ENABLED:-false}
      TextEnrichment__BaseUrl: ${TEXT_ENRICHMENT_BASE_URL:-http://text-enrichment-service:7391}
      TextEnrichment__TimeoutSeconds: ${TEXT_ENRICHMENT_TIMEOUT_SECONDS:-20}
      Qdrant__BaseUrl: ${QDRANT_BASE_URL:-http://qdrant:6333}
      Qdrant__GrpcPort: ${QDRANT_GRPC_PORT:-6334}
      Qdrant__ApiKey: ${QDRANT_API_KEY}
      Qdrant__MemoryCollectionName: ${QDRANT_MEMORY_COLLECTION_NAME:-memory_bgem3_v1}
      Qdrant__DenseVectorName: ${QDRANT_DENSE_VECTOR_NAME:-text-dense}
      Qdrant__SparseVectorName: ${QDRANT_SPARSE_VECTOR_NAME:-text-sparse}
      Qdrant__DenseVectorSize: ${QDRANT_DENSE_VECTOR_SIZE:-1024}
      Embedding__Enabled: ${EMBEDDING_ENABLED:-true}
      Embedding__Backend: ${EMBEDDING_BACKEND:-LocalService}
      Embedding__BaseUrl: ${EMBEDDING_BASE_URL:-http://embedding-service:7291}
      Embedding__TimeoutSeconds: ${EMBEDDING_TIMEOUT_SECONDS:-60}
      Embedding__DenseVectorSize: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}
      Embedding__YandexBaseUrl: ${EMBEDDING_YANDEX_BASE_URL:-https://ai.api.cloud.yandex.net}
      Embedding__YandexApiKey: ${EMBEDDING_YANDEX_API_KEY}
      Embedding__YandexFolderId: ${EMBEDDING_YANDEX_FOLDER_ID}
      Embedding__YandexDocModelUri: ${EMBEDDING_YANDEX_DOC_MODEL_URI}
      Embedding__YandexQueryModelUri: ${EMBEDDING_YANDEX_QUERY_MODEL_URI}
      Embedding__YandexDocModelName: ${EMBEDDING_YANDEX_DOC_MODEL_NAME:-text-search-doc}
      Embedding__YandexQueryModelName: ${EMBEDDING_YANDEX_QUERY_MODEL_NAME:-text-search-query}
    logging: *superchat-json-logging
    healthcheck:
      test: ["CMD-SHELL", "curl --fail --silent http://127.0.0.1:8080/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    labels:
      com.superchat.service: caddy
    depends_on:
      grafana:
        condition: service_started
      superchat-web:
        condition: service_started
      superchat-api:
        condition: service_started
      synapse:
        condition: service_started
      mautrix-telegram:
        condition: service_started
    environment:
      <<: *superchat-log-env
    logging: *superchat-json-logging
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  qdrant-data:
  loki-data:
  prometheus-data:
  grafana-data:
  fluent-bit-state:
  embedding-cache:
  caddy-data:
  caddy-config:
