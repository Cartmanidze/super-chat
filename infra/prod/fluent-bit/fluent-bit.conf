[SERVICE]
    Flush                     1
    Daemon                    Off
    Log_Level                 info
    Parsers_File              /fluent-bit/etc/parsers.conf
    HTTP_Server               On
    HTTP_Listen               0.0.0.0
    HTTP_Port                 2020
    storage.path              /fluent-bit/state/storage
    storage.sync              normal

[INPUT]
    Name                      tail
    Path                      /var/lib/docker/containers/*/*-json.log
    Parser                    docker
    Tag                       docker.*
    DB                        /fluent-bit/state/flb-docker.db
    Mem_Buf_Limit             64MB
    Skip_Long_Lines           On
    Refresh_Interval          5
    Rotate_Wait               30
    Read_from_Head            Off
    storage.type              filesystem

[FILTER]
    Name                      parser
    Match                     docker.*
    Key_Name                  log
    Parser                    superchat_json
    Reserve_Data              On
    Preserve_Key              Off

[OUTPUT]
    Name                      loki
    Match                     docker.*
    Host                      loki
    Port                      3100
    URI                       /loki/api/v1/push
    Labels                    job=superchat,environment=$attrs['SUPERCHAT_LOG_ENVIRONMENT'],service=$attrs['com.superchat.service'],level=$Level,stream=$stream
    Structured_Metadata_Map_Keys $Properties
    Remove_Keys               attrs,stream,time
    Line_Format               json
    Drop_Single_Key           off
