apiVersion: 1

groups:
  - orgId: 1
    name: superchat-log-alerts
    folder: SuperChat
    interval: 1m
    rules:
      - uid: superchat-error-burst
        title: SuperChat error burst
        condition: B
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: sum by (service, environment) (count_over_time({job="superchat", level=~"Error|Fatal"}[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 5
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 1m
        annotations:
          summary: Сервис {{ $labels.service }} в {{ $labels.environment }} дал больше 5 ошибок за 5 минут.
          description: Проверьте Explore в Grafana по label `service={{ $labels.service }}` и `environment={{ $labels.environment }}`.
        labels:
          severity: warning
          source: logs
      - uid: superchat-fatal-exception
        title: SuperChat fatal exception
        condition: B
        data:
          - refId: A
            datasourceUid: loki
            relativeTimeRange:
              from: 60
              to: 0
            model:
              datasource:
                type: loki
                uid: loki
              editorMode: code
              expr: sum by (service, environment) (count_over_time({job="superchat", level="Fatal"}[1m]))
              intervalMs: 1000
              maxDataPoints: 43200
              queryType: range
              refId: A
          - refId: B
            datasourceUid: __expr__
            relativeTimeRange:
              from: 0
              to: 0
            model:
              conditions:
                - evaluator:
                    params:
                      - 0
                    type: gt
                  operator:
                    type: and
                  query:
                    params:
                      - A
                  reducer:
                    params: []
                    type: last
                  type: query
              datasource:
                type: __expr__
                uid: __expr__
              expression: A
              intervalMs: 1000
              maxDataPoints: 43200
              refId: B
              type: classic_conditions
        noDataState: OK
        execErrState: Error
        for: 0s
        annotations:
          summary: В {{ $labels.environment }} за последнюю минуту появилась FATAL-ошибка в {{ $labels.service }}.
          description: Откройте логи сервиса и отфильтруйте по `level="Fatal"` и нужному времени.
        labels:
          severity: critical
          source: logs
