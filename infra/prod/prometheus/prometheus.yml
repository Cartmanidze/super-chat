global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - prometheus:9090

  - job_name: superchat-web
    metrics_path: /metrics
    static_configs:
      - targets:
          - superchat-web:8080

  - job_name: superchat-api
    metrics_path: /metrics
    static_configs:
      - targets:
          - superchat-api:8080

  - job_name: superchat-worker
    metrics_path: /metrics
    static_configs:
      - targets:
          - superchat-worker:8080

  - job_name: loki
    metrics_path: /metrics
    static_configs:
      - targets:
          - loki:3100

  - job_name: fluent-bit
    metrics_path: /api/v1/metrics/prometheus
    static_configs:
      - targets:
          - fluent-bit:2020

  - job_name: qdrant
    metrics_path: /metrics
    static_configs:
      - targets:
          - qdrant:6333
