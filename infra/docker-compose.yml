services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:v1.27
    restart: unless-stopped
    ports:
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
      - "${MAILPIT_UI_PORT:-8025}:8025"

  qdrant:
    image: qdrant/qdrant:v1.15.4
    restart: unless-stopped
    ports:
      - "${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant-data:/qdrant/storage

  embedding-service:
    build:
      context: ./embedding-service
      args:
        INSTALL_BGE: ${EMBEDDING_INSTALL_BGE:-0}
    restart: unless-stopped
    environment:
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-mock}
      EMBEDDING_MODEL_NAME: ${EMBEDDING_MODEL_NAME:-BAAI/bge-m3}
      EMBEDDING_PORT: ${EMBEDDING_PORT:-7291}
      EMBEDDING_DEVICE: ${EMBEDDING_DEVICE:-cpu}
      EMBEDDING_DENSE_VECTOR_SIZE: ${EMBEDDING_DENSE_VECTOR_SIZE:-1024}
    ports:
      - "${EMBEDDING_PORT:-7291}:${EMBEDDING_PORT:-7291}"
    volumes:
      - embedding-cache:/root/.cache/huggingface

  text-enrichment-service:
    build:
      context: ./text-enrichment-service
    restart: unless-stopped
    environment:
      TEXT_ENRICHMENT_PORT: ${TEXT_ENRICHMENT_PORT:-7391}
      TEXT_ENRICHMENT_HEIDELTIME_LANGUAGE: ${TEXT_ENRICHMENT_HEIDELTIME_LANGUAGE:-Russian}
      TEXT_ENRICHMENT_HEIDELTIME_DOCUMENT_TYPE: ${TEXT_ENRICHMENT_HEIDELTIME_DOCUMENT_TYPE:-colloquial}
      TEXT_ENRICHMENT_LOG_LEVEL: ${TEXT_ENRICHMENT_LOG_LEVEL:-INFO}
    ports:
      - "${TEXT_ENRICHMENT_PORT:-7391}:${TEXT_ENRICHMENT_PORT:-7391}"

  synapse:
    image: ${SYNAPSE_IMAGE:-matrixdotorg/synapse:v1.128.0}
    user: "0:0"
    restart: unless-stopped
    entrypoint:
      - /bin/sh
      - /data/start-with-registration.sh
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SYNAPSE_CONFIG_PATH: /data/homeserver.yaml
    volumes:
      - ./synapse:/data
    ports:
      - "${SYNAPSE_PORT:-8008}:8008"

  mautrix-telegram:
    image: ${MAUTRIX_TELEGRAM_IMAGE:-dock.mau.dev/mautrix/telegram:latest}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      synapse:
        condition: service_started
    volumes:
      - ./mautrix:/data

  superchat-db-migrator:
    build:
      context: ..
      dockerfile: src/SuperChat.DbMigrator/Dockerfile
    restart: "no"
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__SuperChatDb: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Persistence__Provider: Postgres
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Qdrant__BaseUrl: http://qdrant:6333
      Qdrant__AutoInitialize: "true"
      Qdrant__MemoryCollectionName: memory_bgem3_v1
      Qdrant__DenseVectorName: text-dense
      Qdrant__SparseVectorName: text-sparse
      Qdrant__DenseVectorSize: 1024

  superchat-web:
    build:
      context: ..
      dockerfile: src/SuperChat.Frontend/Dockerfile
    restart: unless-stopped
    depends_on:
      superchat-api:
        condition: service_started

  superchat-api:
    build:
      context: ..
      dockerfile: src/SuperChat.Api/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      mailpit:
        condition: service_started
      superchat-db-migrator:
        condition: service_completed_successfully
    ports:
      - "${SUPERCHAT_API_PORT:-5050}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_FORWARDEDHEADERS_ENABLED: "true"
      ConnectionStrings__SuperChatDb: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Persistence__Provider: Postgres
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Persistence__AutoInitialize: "true"
      Qdrant__BaseUrl: http://qdrant:6333
      Qdrant__AutoInitialize: "true"
      Embedding__BaseUrl: http://embedding-service:7291
      TextEnrichment__BaseUrl: http://text-enrichment-service:7391
      SuperChat__BaseUrl: http://app.localhost
      SuperChat__ApiSessionDays: 30
      SuperChat__VerificationCodeMinutes: 10
      SuperChat__MaxVerificationAttempts: 5
      SuperChat__DevSeedSampleData: "true"
      SuperChat__AdminEmails__0: pilot@example.com
      Matrix__HomeserverUrl: http://synapse:8008
      Matrix__UserIdPrefix: superchat
      TelegramBridge__BotUserId: "@telegrambot:matrix.localhost"
      TelegramBridge__WebLoginBaseUrl: http://bridge.localhost/public
      Email__FromSender: Super Chat <hello@superchat.local>
      Email__SmtpHost: mailpit
      Email__SmtpPort: 1025
      DeepSeek__ApiKey: ""
      DeepSeek__BaseUrl: https://api.deepseek.com

  superchat-worker:
    build:
      context: ..
      dockerfile: src/SuperChat.Worker/Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      mailpit:
        condition: service_started
      superchat-db-migrator:
        condition: service_completed_successfully
    ports:
      - "${SUPERCHAT_WORKER_PORT:-5051}:8080"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      ConnectionStrings__SuperChatDb: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Persistence__Provider: Postgres
      Persistence__ConnectionString: Host=postgres;Port=5432;Database=superchat_app;Username=postgres;Password=postgres
      Persistence__AutoInitialize: "true"
      Qdrant__BaseUrl: http://qdrant:6333
      Qdrant__AutoInitialize: "true"
      Embedding__BaseUrl: http://embedding-service:7291
      TextEnrichment__BaseUrl: http://text-enrichment-service:7391
      SuperChat__BaseUrl: http://app.localhost
      SuperChat__ApiSessionDays: 30
      SuperChat__VerificationCodeMinutes: 10
      SuperChat__MaxVerificationAttempts: 5
      SuperChat__DevSeedSampleData: "true"
      SuperChat__AdminEmails__0: pilot@example.com
      Matrix__HomeserverUrl: http://synapse:8008
      Matrix__UserIdPrefix: superchat
      TelegramBridge__BotUserId: "@telegrambot:matrix.localhost"
      TelegramBridge__WebLoginBaseUrl: http://bridge.localhost/public
      Email__FromSender: Super Chat <hello@superchat.local>
      Email__SmtpHost: mailpit
      Email__SmtpPort: 1025
      DeepSeek__ApiKey: ""
      DeepSeek__BaseUrl: https://api.deepseek.com

  caddy:
    image: caddy:2.8
    restart: unless-stopped
    depends_on:
      synapse:
        condition: service_started
      superchat-web:
        condition: service_started
      superchat-api:
        condition: service_started
    ports:
      - "${CADDY_HTTP_PORT:-80}:80"
      - "${CADDY_HTTPS_PORT:-443}:443"
    volumes:
      - ./caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy-data:/data
      - caddy-config:/config

volumes:
  postgres-data:
  qdrant-data:
  embedding-cache:
  caddy-data:
  caddy-config:
