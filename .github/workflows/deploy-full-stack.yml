        shell: bash
        env:
          PROD_WEB_HEALTHCHECK_URL: ${{ vars.PROD_WEB_HEALTHCHECK_URL || 'https://app.super-chat.org/health' }}
          PROD_API_HEALTHCHECK_URL: ${{ vars.PROD_API_HEALTHCHECK_URL || 'https://api.super-chat.org/api/v1/health' }}
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${PROD_WEB_HEALTHCHECK_URL}"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${PROD_API_HEALTHCHECK_URL}"
