name: deploy-full-stack

on:
  push:
    branches:
      - staging
    paths:
      - .github/workflows/deploy-full-stack.yml
      - infra/prod/**
      - infra/embedding-service/**
  workflow_dispatch:
    inputs:
      deploy_environment:
        description: "Куда деплоить вручную"
        required: false
        default: staging
        type: choice
        options:
          - staging
          - production

permissions:
  contents: read
  packages: write

jobs:
  build-test-and-deploy-staging:
    if: github.ref == 'refs/heads/staging' && ((github.event_name == 'push' && vars.STAGING_FULL_STACK_DEPLOY_ENABLED == 'true') || (github.event_name == 'workflow_dispatch' && inputs.deploy_environment == 'staging' && vars.STAGING_FULL_STACK_DEPLOY_ENABLED == 'true'))
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: staging-deploy
      cancel-in-progress: false
    environment:
      name: staging
      url: ${{ vars.STAGING_WEB_URL || vars.STAGING_WEB_HEALTHCHECK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/SuperChat.Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/SuperChat.Frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/SuperChat.Frontend
        run: npm run build

      - name: Restore
        run: dotnet restore SuperChat.sln

      - name: Build
        run: dotnet build SuperChat.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SuperChat.sln --configuration Release --no-build

      - name: Validate full-stack deploy assets
        shell: bash
        run: |
          bash -n infra/prod/scripts/preflight.sh
          bash -n infra/prod/scripts/migrate-db.sh
          bash -n infra/prod/scripts/deploy.sh
          python -m py_compile infra/embedding-service/embedding_service.py
          docker compose --env-file infra/prod/.env.example -f infra/prod/docker-compose.yml config >/dev/null

      - id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push superchat-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-web:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-web:main
          cache-from: type=gha,scope=superchat-web
          cache-to: type=gha,mode=max,scope=superchat-web

      - name: Build and push superchat-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-api:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-api:main
          cache-from: type=gha,scope=superchat-api
          cache-to: type=gha,mode=max,scope=superchat-api

      - name: Build and push superchat-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-worker:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-worker:main
          cache-from: type=gha,scope=superchat-worker
          cache-to: type=gha,mode=max,scope=superchat-worker

      - name: Build and push superchat-db-migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.DbMigrator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-db-migrator:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-db-migrator:main
          cache-from: type=gha,scope=superchat-db-migrator
          cache-to: type=gha,mode=max,scope=superchat-db-migrator

      - name: Validate deploy configuration
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$STAGING_SSH_HOST"
          test -n "$STAGING_SSH_PRIVATE_KEY"
          test -n "$STAGING_SSH_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        env:
          STAGING_SSH_PRIVATE_KEY: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
          STAGING_SSH_KNOWN_HOSTS: ${{ secrets.STAGING_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$STAGING_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$STAGING_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push commit to staging bare repository
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT || '22' }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER || 'root' }}
          STAGING_BARE_REPO_PATH: ${{ vars.STAGING_BARE_REPO_PATH || '/opt/super-chat-origin.git' }}
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -p ${STAGING_SSH_PORT} -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes"
          chmod +x .github/scripts/retry.sh
          ./.github/scripts/retry.sh git push "ssh://${STAGING_SSH_USER}@${STAGING_SSH_HOST}:${STAGING_SSH_PORT}${STAGING_BARE_REPO_PATH}" "HEAD:main"

      - name: Pull and full-stack deploy on staging host
        shell: bash
        env:
          STAGING_SSH_HOST: ${{ vars.STAGING_SSH_HOST }}
          STAGING_SSH_PORT: ${{ vars.STAGING_SSH_PORT || '22' }}
          STAGING_SSH_USER: ${{ vars.STAGING_SSH_USER || 'root' }}
          STAGING_WORKTREE_PATH: ${{ vars.STAGING_WORKTREE_PATH || '/opt/super-chat' }}
          STAGING_ENV_FILE: ${{ vars.STAGING_ENV_FILE || '/opt/super-chat/infra/prod/.env' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_TAG="sha-${GITHUB_SHA}"
          chmod +x .github/scripts/retry.sh
          ./.github/scripts/retry.sh \
            ssh -i ~/.ssh/id_ed25519 -p "${STAGING_SSH_PORT}" -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${STAGING_SSH_USER}@${STAGING_SSH_HOST}" \
            "cd '${STAGING_WORKTREE_PATH}' && git pull --ff-only && export GHCR_REGISTRY='ghcr.io' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' SUPERCHAT_WEB_IMAGE='ghcr.io/${OWNER_LC}/superchat-web:${IMAGE_TAG}' SUPERCHAT_API_IMAGE='ghcr.io/${OWNER_LC}/superchat-api:${IMAGE_TAG}' SUPERCHAT_WORKER_IMAGE='ghcr.io/${OWNER_LC}/superchat-worker:${IMAGE_TAG}' SUPERCHAT_DB_MIGRATOR_IMAGE='ghcr.io/${OWNER_LC}/superchat-db-migrator:${IMAGE_TAG}' && bash infra/prod/scripts/migrate-db.sh '${STAGING_ENV_FILE}' && bash infra/prod/scripts/deploy.sh '${STAGING_ENV_FILE}' && docker compose --env-file '${STAGING_ENV_FILE}' -f infra/prod/docker-compose.yml ps"

      - name: Smoke check staging endpoints
        shell: bash
        env:
          STAGING_WEB_HEALTHCHECK_URL: ${{ vars.STAGING_WEB_HEALTHCHECK_URL || 'https://app.tranify.ru/health' }}
          STAGING_API_HEALTHCHECK_URL: ${{ vars.STAGING_API_HEALTHCHECK_URL || 'https://api.tranify.ru/api/v1/health' }}
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${STAGING_WEB_HEALTHCHECK_URL}"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${STAGING_API_HEALTHCHECK_URL}"

  build-test-and-deploy-production:
    if: github.ref == 'refs/heads/production' && github.event_name == 'workflow_dispatch' && inputs.deploy_environment == 'production' && vars.PROD_FULL_STACK_DEPLOY_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.PROD_WEB_URL || vars.PROD_WEB_HEALTHCHECK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: src/SuperChat.Frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: src/SuperChat.Frontend
        run: npm ci

      - name: Build frontend
        working-directory: src/SuperChat.Frontend
        run: npm run build

      - name: Restore
        run: dotnet restore SuperChat.sln

      - name: Build
        run: dotnet build SuperChat.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SuperChat.sln --configuration Release --no-build

      - name: Validate full-stack deploy assets
        shell: bash
        run: |
          bash -n infra/prod/scripts/preflight.sh
          bash -n infra/prod/scripts/migrate-db.sh
          bash -n infra/prod/scripts/deploy.sh
          python -m py_compile infra/embedding-service/embedding_service.py
          docker compose --env-file infra/prod/.env.example -f infra/prod/docker-compose.yml config >/dev/null

      - id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push superchat-web
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Frontend/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-web:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-web:main
          cache-from: type=gha,scope=superchat-web
          cache-to: type=gha,mode=max,scope=superchat-web

      - name: Build and push superchat-api
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Api/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-api:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-api:main
          cache-from: type=gha,scope=superchat-api
          cache-to: type=gha,mode=max,scope=superchat-api

      - name: Build and push superchat-worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.Worker/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-worker:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-worker:main
          cache-from: type=gha,scope=superchat-worker
          cache-to: type=gha,mode=max,scope=superchat-worker

      - name: Build and push superchat-db-migrator
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/SuperChat.DbMigrator/Dockerfile
          push: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-db-migrator:sha-${{ github.sha }}
            ghcr.io/${{ steps.vars.outputs.owner_lc }}/superchat-db-migrator:main
          cache-from: type=gha,scope=superchat-db-migrator
          cache-to: type=gha,mode=max,scope=superchat-db-migrator

      - name: Validate deploy configuration
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$PROD_SSH_HOST"
          test -n "$PROD_SSH_PRIVATE_KEY"
          test -n "$PROD_SSH_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push commit to production bare repository
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_BARE_REPO_PATH: ${{ vars.PROD_BARE_REPO_PATH || '/opt/super-chat-origin.git' }}
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -p ${PROD_SSH_PORT} -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes"
          chmod +x .github/scripts/retry.sh
          ./.github/scripts/retry.sh git push "ssh://${PROD_SSH_USER}@${PROD_SSH_HOST}:${PROD_SSH_PORT}${PROD_BARE_REPO_PATH}" "HEAD:main"

      - name: Pull and full-stack deploy on production host
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_WORKTREE_PATH: ${{ vars.PROD_WORKTREE_PATH || '/opt/super-chat' }}
          PROD_ENV_FILE: ${{ vars.PROD_ENV_FILE || '/opt/super-chat/infra/prod/.env' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_TAG="sha-${GITHUB_SHA}"
