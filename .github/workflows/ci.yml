name: ci

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  detect-full-stack-changes:
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    outputs:
      requires_full_stack: ${{ steps.paths.outputs.requires_full_stack }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: paths
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          EVENT_BEFORE: ${{ github.event.before }}
          CURRENT_SHA: ${{ github.sha }}
        run: |
          if [ "$EVENT_NAME" = "workflow_dispatch" ]; then
            echo "requires_full_stack=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -z "$EVENT_BEFORE" ] || [ "$EVENT_BEFORE" = "0000000000000000000000000000000000000000" ]; then
            echo "requires_full_stack=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if git diff --quiet "$EVENT_BEFORE" "$CURRENT_SHA" -- \
            .github/workflows/deploy-full-stack.yml \
            infra/prod \
            infra/embedding-service; then
            echo "requires_full_stack=false" >> "$GITHUB_OUTPUT"
          else
            echo "requires_full_stack=true" >> "$GITHUB_OUTPUT"
          fi

  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SuperChat.sln

      - name: Build
        run: dotnet build SuperChat.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SuperChat.sln --configuration Release --no-build

  build-and-push-images:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.PROD_DEPLOY_ENABLED == 'true' && needs.detect-full-stack-changes.outputs.requires_full_stack != 'true'
    needs:
      - detect-full-stack-changes
      - build-test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: superchat-web
            context: .
            dockerfile: src/SuperChat.Web/Dockerfile
          - image_name: superchat-api
            context: .
            dockerfile: src/SuperChat.Api/Dockerfile
          - image_name: superchat-worker
            context: .
            dockerfile: src/SuperChat.Worker/Dockerfile
          # mautrix-telegram-helper is built on the server only (requires local base image)
          - image_name: superchat-db-migrator
            context: .
            dockerfile: src/SuperChat.DbMigrator/Dockerfile

    steps:
      - uses: actions/checkout@v4

      - id: vars
        shell: bash
        run: |
          echo "owner_lc=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ steps.vars.outputs.owner_lc }}/${{ matrix.image_name }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=main,enable={{is_default_branch}}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          file: ${{ matrix.dockerfile }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}

  deploy-production:
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main' && vars.PROD_DEPLOY_ENABLED == 'true' && needs.detect-full-stack-changes.outputs.requires_full_stack != 'true'
    needs:
      - detect-full-stack-changes
      - build-test
      - build-and-push-images
    runs-on: ubuntu-latest
    timeout-minutes: 45
    concurrency:
      group: production-deploy
      cancel-in-progress: false
    environment:
      name: production
      url: ${{ vars.PROD_WEB_URL || vars.PROD_WEB_HEALTHCHECK_URL }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy configuration
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          test -n "$PROD_SSH_HOST"
          test -n "$PROD_SSH_PRIVATE_KEY"
          test -n "$PROD_SSH_KNOWN_HOSTS"

      - name: Configure SSH
        shell: bash
        env:
          PROD_SSH_PRIVATE_KEY: ${{ secrets.PROD_SSH_PRIVATE_KEY }}
          PROD_SSH_KNOWN_HOSTS: ${{ secrets.PROD_SSH_KNOWN_HOSTS }}
        run: |
          install -m 700 -d ~/.ssh
          printf '%s\n' "$PROD_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          printf '%s\n' "$PROD_SSH_KNOWN_HOSTS" > ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Push commit to server bare repository
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_BARE_REPO_PATH: ${{ vars.PROD_BARE_REPO_PATH || '/opt/super-chat-origin.git' }}
        run: |
          export GIT_SSH_COMMAND="ssh -i ~/.ssh/id_ed25519 -p ${PROD_SSH_PORT} -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes"
          chmod +x .github/scripts/retry.sh
          ./.github/scripts/retry.sh git push "ssh://${PROD_SSH_USER}@${PROD_SSH_HOST}:${PROD_SSH_PORT}${PROD_BARE_REPO_PATH}" "HEAD:main"

      - name: Pull and deploy on production host
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_WORKTREE_PATH: ${{ vars.PROD_WORKTREE_PATH || '/opt/super-chat' }}
          PROD_ENV_FILE: ${{ vars.PROD_ENV_FILE || '/opt/super-chat/infra/prod/.env' }}
          GHCR_USERNAME: ${{ github.actor }}
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          OWNER_LC="${GITHUB_REPOSITORY_OWNER,,}"
          IMAGE_TAG="sha-${GITHUB_SHA::7}"
          chmod +x .github/scripts/retry.sh
          ./.github/scripts/retry.sh \
            ssh -i ~/.ssh/id_ed25519 -p "${PROD_SSH_PORT}" -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "cd '${PROD_WORKTREE_PATH}' && git stash --include-untracked 2>/dev/null; git pull --ff-only && git stash drop 2>/dev/null; export GHCR_REGISTRY='ghcr.io' GHCR_USERNAME='${GHCR_USERNAME}' GHCR_TOKEN='${GHCR_TOKEN}' SUPERCHAT_WEB_IMAGE='ghcr.io/${OWNER_LC}/superchat-web:${IMAGE_TAG}' SUPERCHAT_API_IMAGE='ghcr.io/${OWNER_LC}/superchat-api:${IMAGE_TAG}' SUPERCHAT_WORKER_IMAGE='ghcr.io/${OWNER_LC}/superchat-worker:${IMAGE_TAG}' SUPERCHAT_DB_MIGRATOR_IMAGE='ghcr.io/${OWNER_LC}/superchat-db-migrator:${IMAGE_TAG}' && bash infra/prod/scripts/migrate-db.sh '${PROD_ENV_FILE}' && bash infra/prod/scripts/deploy-app.sh '${PROD_ENV_FILE}'"

      - name: Smoke check production endpoints
        shell: bash
        env:
          PROD_WEB_HEALTHCHECK_URL: ${{ vars.PROD_WEB_HEALTHCHECK_URL || 'https://app.tranify.ru/health' }}
          PROD_API_HEALTHCHECK_URL: ${{ vars.PROD_API_HEALTHCHECK_URL || 'https://api.tranify.ru/api/v1/health' }}
        run: |
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${PROD_WEB_HEALTHCHECK_URL}"
          curl --fail --silent --show-error --retry 12 --retry-delay 5 --retry-connrefused "${PROD_API_HEALTHCHECK_URL}"

      - name: Smoke check production worker health
        shell: bash
        env:
          PROD_SSH_HOST: ${{ vars.PROD_SSH_HOST }}
          PROD_SSH_PORT: ${{ vars.PROD_SSH_PORT || '22' }}
          PROD_SSH_USER: ${{ vars.PROD_SSH_USER || 'root' }}
          PROD_WORKTREE_PATH: ${{ vars.PROD_WORKTREE_PATH || '/opt/super-chat' }}
          PROD_ENV_FILE: ${{ vars.PROD_ENV_FILE || '/opt/super-chat/infra/prod/.env' }}
        run: |
          ssh -i ~/.ssh/id_ed25519 -p "${PROD_SSH_PORT}" -o BatchMode=yes -o PreferredAuthentications=publickey -o PubkeyAuthentication=yes -o PasswordAuthentication=no -o KbdInteractiveAuthentication=no -o ConnectionAttempts=1 -o ConnectTimeout=20 -o StrictHostKeyChecking=yes "${PROD_SSH_USER}@${PROD_SSH_HOST}" \
            "cd '${PROD_WORKTREE_PATH}' && docker compose --env-file '${PROD_ENV_FILE}' -f infra/prod/docker-compose.yml exec -T superchat-worker curl --fail --silent --show-error http://127.0.0.1:8080/health"
