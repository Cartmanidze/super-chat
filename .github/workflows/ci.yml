name: ci

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Restore
        run: dotnet restore SuperChat.sln

      - name: Build
        run: dotnet build SuperChat.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test SuperChat.sln --configuration Release --no-build
